input {
  kafka {
    # Replace "kafka:9092" with your actual Kafka service name and internal port
    bootstrap_servers => "kafka-ls:9092" 
    topics => ["normalized-logs-topic"]
    
    # Assuming your normalized logs are already in JSON format
    codec => "json" 
    
    # Optional: A consumer group ID
    group_id => "logstash_es_indexer"
  }
}

filter {
  # If your "normalized_logs" need any further formatting, date parsing, 
  # or field dropping before hitting ES, you would do that here.
}

output {
  elasticsearch {
    # Replace with your actual Elasticsearch service name and port
    hosts => ["http://elasticsearch-ls:9200"] 
    
    # The target index. Note: if you want daily rolling indices, 
    # you could use "log_event-%{+YYYY.MM.dd}"
    index => "log_event"
    
    # If your ES has security enabled, add credentials here:
    # user => "elastic"
    # password => "your_password"
  }
  
  # Useful for debugging to see if Logstash is actually receiving messages
  stdout { codec => rubydebug } 
}
