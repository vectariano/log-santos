services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-ls
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    networks:
      - log-santos-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-ls
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - log-santos-net
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter-ls
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    networks:
      - log-santos-net
    restart: unless-stopped

volumes:
  prometheus_data:

networks:
  log-santos-net:
    external: true
    name: net-ls